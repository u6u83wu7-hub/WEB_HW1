<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iLearn 系統忙碌中 - 搶修大作戰</title>
    <style>
        body { margin: 0; padding: 0; height: 4000px; font-family: "Microsoft JhengHei", Arial, sans-serif; display: flex; background-color: #fafafa; }
        
        #game-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; font-family: 'Arial Black', sans-serif;
        }
        
        #game-canvas { 
            background: #e0f7fa; border: 5px solid #333; border-radius: 8px; 
            cursor: ew-resize; max-width: 100vw; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .game-header { text-align: center; margin-bottom: 10px; }
        .game-header h2 { margin: 0; color: #ffeb3b; }
        .game-header p { margin: 5px 0; font-weight: normal; font-family: "Microsoft JhengHei"; font-size: 0.9em; }
        .score-board { color: #4CAF50; font-size: 1.2em; margin-top: 5px; }

        .left-container { width: 40%; height: 100vh; position: fixed; top: 0; left: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #e9e9e9; border-right: 1px solid #ddd; }
        .img-wrapper { flex: 0 1 auto; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .left-container img { max-width: 80%; height: auto; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        .scroll-hint-box { background-color: #333; color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 0.9em; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
        .right-content { margin-left: 40%; width: 60%; display: flex; flex-direction: column; align-items: center; padding-top: 15vh; }
        .info-box { width: 450px; padding: 40px; border: 2px solid #333; background: white; text-align: center; position: sticky; top: 80px; box-shadow: 10px 10px 0px #333; }
        .queue-container { margin: 25px 0; padding: 20px; background-color: #fffdf0; border: 1px dashed #ff9800; border-radius: 12px; }
        .progress-bg { width: 100%; height: 24px; background-color: #eee; border-radius: 12px; overflow: hidden; margin: 10px 0; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ff9800, #f44336); transition: width 0.8s linear; }
        
        .game-start-btn { 
            background-color: #d32f2f; color: white; border: none; padding: 12px 24px; 
            font-size: 1.1em; font-weight: bold; border-radius: 50px; cursor: pointer; 
            transition: transform 0.2s, background-color 0.2s; margin-top: 15px; 
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4); 
        }
        .game-start-btn:hover { background-color: #b71c1c; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="game-overlay">
        <div class="game-header">
            <h2>🚨 伺服器保衛戰 🚨</h2>
            <p>越後面學生越多、衝越快！試著活下去吧！</p>
            <div class="score-board">成功處理作業份數：<span id="score">0</span></div>
        </div>
        <canvas id="game-canvas" width="400" height="600"></canvas>
    </div>

    <div class="left-container">
        <div class="img-wrapper"><img id="mainImg" src="01.png" alt="道歉動作中"></div>
        <div class="scroll-hint-box">↓ 持續下滑，感受誠摯道歉 ↓</div>
    </div>

    <div class="right-content">
        <div class="info-box">
            <h1>十分抱歉！</h1>
            <p id="crash-text"><strong>(iLearn) 系統目前忙碌中</strong><br>伺服器負載過高，工程師正在跪著修...</p>
            
            <div class="queue-container">
                <div>前方排隊人數：<span id="queue-count">--</span> 人</div>
                <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
                <div style="font-size: 0.85em; color: #666;">預計等待：<span id="wait-time">--</span> 分鐘</div>
            </div>

            <button id="startBtn" class="game-start-btn" onclick="openGame()">協助搶修 (進入小遊戲)</button>
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            <div style="text-align: left; font-size: 0.85em; color: #666;">• 服務電話：886-4-24517250 轉 2780</div>
        </div>
    </div>

    <script>
        /* --- 1. 圖片與排隊邏輯 --- */
        let initialQueue = Math.floor(Math.random() * 50) + 30;
        let currentQueue = initialQueue;
        let queueTimer;

        window.addEventListener("scroll", function() {
            let scrollY = window.scrollY;
            let img = document.getElementById("mainImg");
            img.src = ["01.png", "02.png", "03.png", "02.png"][Math.floor(scrollY / 150) % 4];
        });

        function updateQueueDisplay() {
            document.getElementById("queue-count").innerText = currentQueue;
            document.getElementById("wait-time").innerText = Math.ceil(currentQueue * 0.5);
            document.getElementById("progress-bar").style.width = ((initialQueue - currentQueue) / initialQueue) * 100 + "%";
            
            // 當排隊人數歸零時，重置為一開始的隨機人數，讓排隊永遠排不完
            if (currentQueue <= 0) { 
                alert("系統無回應，將為您重新連線排隊..."); 
                initialQueue = Math.floor(Math.random() * 50) + 30;
                currentQueue = initialQueue;
            }
        }

        function startQueue() {
            clearInterval(queueTimer);
            queueTimer = setInterval(() => {
                currentQueue = Math.max(0, currentQueue - (Math.floor(Math.random() * 2) + 1));
                updateQueueDisplay();
            }, 2000);
            updateQueueDisplay();
        }
        startQueue();

        /* --- 2. 困難版跑酷小遊戲邏輯 --- */
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        let gameActive = false;
        let engCount = 5; 
        let playerX = 200, targetX = 200;
        const playerY = 480;
        
        let gameObjects = [];
        let scrollSpeed = 5;
        let distanceTraveled = 0;
        let score = 0;

        canvas.addEventListener('mousemove', (e) => { targetX = e.clientX - canvas.getBoundingClientRect().left; });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); targetX = e.touches[0].clientX - canvas.getBoundingClientRect().left; }, {passive: false});

        function openGame() {
            // 每次重新進入遊戲時，把外面的道歉文字恢復原狀
            document.getElementById('crash-text').innerHTML = `<strong>(iLearn) 系統目前忙碌中</strong><br>伺服器負載過高，工程師正在跪著修...`;
            document.getElementById('startBtn').innerText = "協助搶修 (進入小遊戲)";
            
            document.getElementById('game-overlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            initGame();
        }

        function initGame() {
            engCount = 10;
            playerX = 200; targetX = 200;
            distanceTraveled = 0;
            score = 0;
            gameObjects = [];
            document.getElementById('score').innerText = score;
            gameActive = true;
            spawnGate(-100);
            requestAnimationFrame(gameLoop);
        }

        function spawnGate(yPos) {
            let diffMultiplier = 1 + Math.floor(distanceTraveled / 2000); 
            const ops = [
                { op: '+', val: (Math.floor(Math.random() * 30) + 10) * diffMultiplier },
                { op: '+', val: (Math.floor(Math.random() * 50) + 20) * diffMultiplier },
                { op: 'x', val: Math.floor(Math.random() * 3) + 2 },
                { op: '-', val: Math.floor(Math.random() * 20) + 5 }
            ];
            let left = ops[Math.floor(Math.random() * ops.length)];
            let right = ops[Math.floor(Math.random() * ops.length)];
            gameObjects.push({ type: 'gate', y: yPos, left: left, right: right, passed: false });
        }

        function spawnEnemy(yPos) {
            let diffLevel = distanceTraveled / 1000; 
            let maxSwarms = Math.min(5, 1 + Math.floor(diffLevel / 3));
            let numEnemies = 1 + Math.floor(Math.random() * maxSwarms);

            for(let i = 0; i < numEnemies; i++) {
                let baseEnemy = 20 + Math.floor(diffLevel * 40);
                let count = baseEnemy + Math.floor(Math.random() * baseEnemy * 0.5);
                let homingPower = Math.min(0.08, 0.02 + (diffLevel * 0.005) + Math.random() * 0.015);
                let extraFallSpeed = Math.min(4.0, (diffLevel * 0.3) + Math.random());

                gameObjects.push({ 
                    type: 'enemy', 
                    x: Math.random() * (canvas.width - 80) + 40, 
                    y: yPos - (i * 70), 
                    count: count, 
                    homing: homingPower,     
                    fallSpeed: extraFallSpeed, 
                    passed: false 
                });
            }
        }

        function applyGateMath(op, val) {
            if (op === '+') engCount += val;
            if (op === '-') engCount -= val;
            if (op === 'x') engCount *= val;
            if (engCount < 1) engCount = 1; 
        }

        function gameLoop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            distanceTraveled += scrollSpeed;
            score += 0.05; 
            document.getElementById('score').innerText = Math.floor(score);

            ctx.strokeStyle = 'rgba(0,0,0,0.05)';
            ctx.lineWidth = 2;
            for(let i=0; i<canvas.height; i+=40) {
                let offset = (distanceTraveled % 40);
                ctx.beginPath(); ctx.moveTo(0, i + offset); ctx.lineTo(canvas.width, i + offset); ctx.stroke();
            }

            playerX += (targetX - playerX) * 0.15;
            if (playerX < 20) playerX = 20;
            if (playerX > canvas.width - 20) playerX = canvas.width - 20;

            let playerRadius = Math.min(60, 15 + Math.sqrt(engCount) * 2);

            let spawnThreshold = Math.max(60, 160 - Math.floor(distanceTraveled / 100));
            let lastObj = gameObjects[gameObjects.length - 1];
            
            if (!lastObj || lastObj.y > spawnThreshold) { 
                if (Math.random() < 0.35) spawnGate(-100);
                else spawnEnemy(-100);
            }

            for (let i = gameObjects.length - 1; i >= 0; i--) {
                let obj = gameObjects[i];
                obj.y += scrollSpeed;

                if (obj.passed) continue;

                if (obj.type === 'gate') {
                    ctx.fillStyle = 'rgba(33, 150, 243, 0.4)'; ctx.fillRect(0, obj.y, canvas.width/2, 50);
                    ctx.fillStyle = 'rgba(76, 175, 80, 0.4)'; ctx.fillRect(canvas.width/2, obj.y, canvas.width/2, 50);
                    ctx.fillStyle = 'white'; ctx.fillRect(canvas.width/2 - 2, obj.y, 4, 50);
                    
                    ctx.fillStyle = 'black'; ctx.font = '22px Arial Black'; ctx.textAlign = 'center';
                    ctx.fillText(obj.left.op + obj.left.val, canvas.width/4, obj.y + 35);
                    ctx.fillText(obj.right.op + obj.right.val, canvas.width*0.75, obj.y + 35);

                    if (playerY > obj.y && playerY < obj.y + 50) {
                        obj.passed = true;
                        if (playerX < canvas.width / 2) applyGateMath(obj.left.op, obj.left.val);
                        else applyGateMath(obj.right.op, obj.right.val);
                    }
                } 
                else if (obj.type === 'enemy') {
                    if (obj.y > 0) {
                        obj.y += 2.0 + obj.fallSpeed; 
                        obj.x += (playerX - obj.x) * obj.homing; 
                    }

                    let enemyRadius = Math.min(60, 15 + Math.sqrt(obj.count) * 2);
                    
                    ctx.fillStyle = '#f44336'; ctx.beginPath(); ctx.arc(obj.x, obj.y, enemyRadius, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = 'white'; ctx.font = '20px Arial Black'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(Math.ceil(obj.count), obj.x, obj.y);

                    let dist = Math.hypot(playerX - obj.x, playerY - obj.y);
                    if (dist < playerRadius + enemyRadius) {
                        let drain = Math.ceil(Math.min(engCount, obj.count) * 0.15); 
                        if(drain < 1) drain = 1;
                        
                        engCount -= drain;
                        obj.count -= drain;
                        score += drain; 

                        if (engCount <= 0) {
                            gameCrash();
                            return;
                        }
                        if (obj.count <= 0) {
                            obj.passed = true;
                        }
                    }
                }

                if (obj.y > canvas.height + 200) {
                    gameObjects.splice(i, 1);
                }
            }

            ctx.fillStyle = '#2196F3'; ctx.beginPath(); ctx.arc(playerX, playerY, playerRadius, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
            ctx.fillStyle = 'white'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(Math.ceil(engCount), playerX, playerY);

            requestAnimationFrame(gameLoop);
        }

        function gameCrash() {
            gameActive = false;
            let finalScore = Math.floor(score);
            alert(`防線崩潰！\n你帶領工程師成功處理了 ${finalScore} 份作業，但最後還是被排山倒海的學生淹沒了...`);
            
            document.getElementById('game-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
            
            // 改變文字增加嘲諷感
            document.getElementById('crash-text').innerHTML = `<strong style='color:red;'>(iLearn) 系統徹底死機！</strong><br>工程師已被 ${finalScore} 份海量作業壓垮...`;
            
            // 這次不隱藏按鈕，而是更改按鈕文字，讓玩家可以重玩
            let btn = document.getElementById('startBtn');
            btn.innerText = "再次派出工程師";
            btn.style.backgroundColor = "#ff5722"; // 換個顏色提示是重玩
            
            // 排隊人數變成絕望的 999 且重新計時
            initialQueue = 999; currentQueue = 999;
            startQueue();
        }
    </script>
</body>
</html>
